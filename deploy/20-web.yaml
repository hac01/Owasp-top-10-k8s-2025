# The web app (Next.js). Pure UI — it needs no cluster access, so it runs as the
# default ServiceAccount with the token NOT mounted. Reachable at localhost:30090.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: nimbusmart-ctf
  labels:
    app: ctf-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctf-web
  template:
    metadata:
      labels:
        app: ctf-web
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: nimbusmart-ctf-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: nimbusmart-ctf
  labels:
    app: ctf-web
spec:
  type: NodePort
  selector:
    app: ctf-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30090
