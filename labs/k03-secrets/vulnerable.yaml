# K03 — Secrets Management Failures (VULNERABLE)
# NimbusMart's checkout/payments-api. To "ship fast", an engineer pasted the
# live Stripe secret key straight into the pod spec as a plaintext env Value,
# and dropped a second billing credential into a plaintext ConfigMap. Both are
# recoverable by anyone with `get pod` / `get configmap` — no exec, no RCE:
#   - STRIPE_SECRET_KEY is a hardcoded literal env value (baked into etcd too)
#   - BILLING_WEBHOOK_TOKEN sits in an unencrypted ConfigMap
#
# Capture the flag:
#   kubectl get pod -n checkout -o yaml | grep -i stripe
#   kubectl exec -n checkout deploy/payments-api -- env | grep STRIPE
#
# DO NOT put real secrets in manifests, env values, or ConfigMaps.
apiVersion: v1
kind: Namespace
metadata:
  name: checkout
  labels:
    app.kubernetes.io/part-of: nimbusmart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-config
  namespace: checkout
  labels:
    owasp: k03
data:
  # A ConfigMap is NOT a secret — it is unencrypted and readable to anyone with
  # `get configmap`. This billing webhook token has no business living here.
  BILLING_WEBHOOK_TOKEN: "whsec_9f8e7d6c5b4a3210nimbus"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: checkout
  labels:
    app: payments-api
    owasp: k03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
        owasp: k03
    spec:
      containers:
        - name: payments-api
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          env:
            # Hardcoded plaintext Stripe key — visible in `kubectl get pod -o yaml`
            # and `kubectl exec ... env`. This is the flag.
            - name: STRIPE_SECRET_KEY
              value: "FLAG{hardcoded_stripe_key_sk_live_nimbus}"
          envFrom:
            # Pulls the plaintext ConfigMap credential straight into the env.
            - configMapRef:
                name: payments-config
